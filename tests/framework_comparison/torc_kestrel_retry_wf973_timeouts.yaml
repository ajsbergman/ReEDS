    resource_requirements: retry_timeout_job

  - name: pyoptinterface_xpress_large_retry_wf973
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_pyoptinterface --solver xpress --size large --label pyoptinterface_xpress_large_retry_wf973 --output tests/framework_comparison/torc_output_retry_wf973/framework_results/pyoptinterface_xpress_large_retry_wf973.json
    env:
      FRAMEWORK_MODULES: "gams/51.3.0 xpressmp conda/2024.06.1"
    resource_requirements: retry_timeout_job

  - name: pyoptinterface_xpress_xlarge_retry_wf973
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_pyoptinterface --solver xpress --size xlarge --label pyoptinterface_xpress_xlarge_retry_wf973 --output tests/framework_comparison/torc_output_retry_wf973/framework_results/pyoptinterface_xpress_xlarge_retry_wf973.json
