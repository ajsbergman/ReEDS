    resource_requirements: retry_timeout_job

  - name: pyomo_xpress_xlarge_retry_wf973
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_pyomo --solver xpress --size xlarge --label pyomo_xpress_xlarge_retry_wf973 --output tests/framework_comparison/torc_output_retry_wf973/framework_results/pyomo_xpress_xlarge_retry_wf973.json
