    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver xpress --size xlarge --label arco_xpress_xlarge_retry_wf973 --output tests/framework_comparison/torc_output_retry_wf973/framework_results/arco_xpress_xlarge_retry_wf973.json
