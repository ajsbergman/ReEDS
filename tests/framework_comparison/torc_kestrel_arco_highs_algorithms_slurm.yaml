- name: arco_highs_simplex_large
  command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_simplex_large --highs-solver simplex --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_simplex_large.json
  invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
  resource_requirements: large_job
  scheduler: large_job_scheduler
- name: arco_highs_simplex_xlarge
  command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_simplex_xlarge --highs-solver simplex --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_simplex_xlarge.json
  invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
  resource_requirements: xlarge_job
  scheduler: xlarge_job_scheduler
- name: arco_highs_choose_medium
  command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_choose_medium --highs-solver choose --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_choose_medium.json
  invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
  resource_requirements: medium_job
  scheduler: medium_job_scheduler
- name: arco_highs_choose_large
  command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_choose_large --highs-solver choose --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_choose_large.json
