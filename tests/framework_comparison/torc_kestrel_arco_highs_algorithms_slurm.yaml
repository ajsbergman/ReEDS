- name: arco_highs_choose_xlarge
  command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_choose_xlarge --highs-solver choose --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_choose_xlarge.json
  invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
  resource_requirements: xlarge_job
  scheduler: xlarge_job_scheduler

resource_requirements:
- name: medium_job
  num_cpus: 4
  num_gpus: 0
  num_nodes: 1
  memory: 32G
  runtime: PT1H
- name: large_job
  num_cpus: 8
  num_gpus: 0
  num_nodes: 1
  memory: 96G
  runtime: PT8H
- name: xlarge_job
  num_cpus: 16
  num_gpus: 0
  num_nodes: 1
  memory: 240G
  runtime: PT12H

slurm_schedulers:
- name: large_job_scheduler
  account: reedseda
  mem: 240g
  nodes: 1
  walltime: 12:00:00
- name: xlarge_job_scheduler
  account: reedseda
  mem: 240g
  nodes: 1
  walltime: 18:00:00
- name: medium_job_scheduler
  account: reedseda
  mem: 240g
  nodes: 1
  walltime: 01:30:00

slurm_defaults:
  account: ${SLURM_ACCOUNT:-ntps}

actions:
- trigger_type: on_workflow_start
  action_type: schedule_nodes
  scheduler: large_job_scheduler
  scheduler_type: slurm
  num_allocations: 4
- trigger_type: on_workflow_start
  action_type: schedule_nodes
  scheduler: xlarge_job_scheduler
  scheduler_type: slurm
  num_allocations: 7
- trigger_type: on_workflow_start
  action_type: schedule_nodes
  scheduler: medium_job_scheduler
  scheduler_type: slurm
  num_allocations: 1
