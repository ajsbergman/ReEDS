# Focused Kestrel Torc/Slurm workflow for Arco/HiGHS algorithm sweeps.
#
# Purpose:
#   Compare HiGHS algorithm choices on the dense-CAP ReEDS formulation with
#   objective-only consumed Arco solves. This is a local/open-solver complement
#   to the Arco/Xpress commercial-backend sweep.
#
# Suggested run with Torc v0.36.0 or newer:
#   torc slurm generate --account reedseda --profile kestrel \
#     --group-by resource-requirements --overwrite \
#     -o tests/framework_comparison/torc_kestrel_arco_highs_algorithms_slurm.yaml \
#     tests/framework_comparison/torc_kestrel_arco_highs_algorithms.yaml
#   torc submit --max-parallel-jobs 1 \
#     -o <torc-output-dir> \
#     tests/framework_comparison/torc_kestrel_arco_highs_algorithms_slurm.yaml

name: framework-comparison-arco-highs-algorithms
description: Focused Arco/HiGHS algorithm sweep on Kestrel

slurm_defaults:
  account: "${SLURM_ACCOUNT:-ntps}"

env:
  FRAMEWORK_MODULES: "gams/51.3.0 conda/2024.06.1"
  FRAMEWORK_UV_PROJECT: "."
  FRAMEWORK_UV_GROUPS: "framework-comparison"
  FRAMEWORK_COMPARISON_ARCO_PREFIX: "/scratch/psanchez/arco/latest"
  OPENBLAS_NUM_THREADS: "4"
  OMP_NUM_THREADS: "4"
  MKL_NUM_THREADS: "4"
  NUMEXPR_MAX_THREADS: "4"
  TORC_API_URL: "http://torc.hpc.nrel.gov:8080/torc-service/v1"

resource_requirements:
  - name: medium_job
    num_cpus: 4
    memory: "32G"
    runtime: "PT1H"

  - name: large_job
    num_cpus: 8
    memory: "96G"
    runtime: "PT8H"

  - name: xlarge_job
    num_cpus: 16
    memory: "240G"
    runtime: "PT12H"

jobs:
  # --- Arco / HiGHS IPM ---------------------------------------------
  - name: arco_highs_ipm_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_ipm_medium --highs-solver ipm --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_medium.json
    resource_requirements: medium_job

  - name: arco_highs_ipm_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_ipm_large --highs-solver ipm --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_large.json
    resource_requirements: large_job

  - name: arco_highs_ipm_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_ipm_xlarge --highs-solver ipm --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_xlarge.json
    resource_requirements: xlarge_job

  # --- Arco / HiGHS IPM, direct C-API load path ---------------------
  - name: arco_highs_ipm_direct_load_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_ipm_direct_load_medium --highs-solver ipm --highs-load-path direct --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_direct_load_medium.json
    resource_requirements: medium_job

  - name: arco_highs_ipm_direct_load_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_ipm_direct_load_large --highs-solver ipm --highs-load-path direct --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_direct_load_large.json
    resource_requirements: large_job

  - name: arco_highs_ipm_direct_load_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_ipm_direct_load_xlarge --highs-solver ipm --highs-load-path direct --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_direct_load_xlarge.json
    resource_requirements: xlarge_job

  # --- Arco / HiGHS IPM, direct C-API load path + presolve disabled -
  - name: arco_highs_ipm_direct_load_presolve_off_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_ipm_direct_load_presolve_off_medium --highs-solver ipm --highs-load-path direct --presolve off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_direct_load_presolve_off_medium.json
    resource_requirements: medium_job

  - name: arco_highs_ipm_direct_load_presolve_off_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_ipm_direct_load_presolve_off_large --highs-solver ipm --highs-load-path direct --presolve off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_direct_load_presolve_off_large.json
    resource_requirements: large_job

  - name: arco_highs_ipm_direct_load_presolve_off_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_ipm_direct_load_presolve_off_xlarge --highs-solver ipm --highs-load-path direct --presolve off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_direct_load_presolve_off_xlarge.json
    resource_requirements: xlarge_job

  # --- Arco / HiGHS IPM, presolve disabled -------------------------
  - name: arco_highs_ipm_presolve_off_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_ipm_presolve_off_medium --highs-solver ipm --presolve off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_presolve_off_medium.json
    resource_requirements: medium_job

  - name: arco_highs_ipm_presolve_off_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_ipm_presolve_off_large --highs-solver ipm --presolve off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_presolve_off_large.json
    resource_requirements: large_job

  - name: arco_highs_ipm_presolve_off_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_ipm_presolve_off_xlarge --highs-solver ipm --presolve off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_presolve_off_xlarge.json
    resource_requirements: xlarge_job

  # --- Arco / HiGHS IPM, crossover disabled ------------------------
  - name: arco_highs_ipm_crossover_off_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_ipm_crossover_off_medium --highs-solver ipm --highs-run-crossover off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_crossover_off_medium.json
    resource_requirements: medium_job

  - name: arco_highs_ipm_crossover_off_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_ipm_crossover_off_large --highs-solver ipm --highs-run-crossover off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_crossover_off_large.json
    resource_requirements: large_job

  - name: arco_highs_ipm_crossover_off_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_ipm_crossover_off_xlarge --highs-solver ipm --highs-run-crossover off --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_ipm_crossover_off_xlarge.json
    resource_requirements: xlarge_job

  # --- Arco / HiGHS simplex -----------------------------------------
  - name: arco_highs_simplex_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_simplex_medium --highs-solver simplex --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_simplex_medium.json
    resource_requirements: medium_job

  - name: arco_highs_simplex_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_simplex_large --highs-solver simplex --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_simplex_large.json
    resource_requirements: large_job

  - name: arco_highs_simplex_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_simplex_xlarge --highs-solver simplex --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_simplex_xlarge.json
    resource_requirements: xlarge_job

  # --- Arco / HiGHS choose ------------------------------------------
  - name: arco_highs_choose_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size medium --label arco_highs_choose_medium --highs-solver choose --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_choose_medium.json
    resource_requirements: medium_job

  - name: arco_highs_choose_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size large --label arco_highs_choose_large --highs-solver choose --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_choose_large.json
    resource_requirements: large_job

  - name: arco_highs_choose_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh
    command: python tests/framework_comparison/run_framework.py --module solve_arco --solver highs --size xlarge --label arco_highs_choose_xlarge --highs-solver choose --output tests/framework_comparison/torc_output_highs_algorithms/framework_results/arco_highs_choose_xlarge.json
    resource_requirements: xlarge_job
