# Kestrel HPC Torc/Slurm workflow — full framework × solver × size matrix.
#
# Frameworks: gams, linopy, arco, pyomo, pyoptinterface
# Solvers:    cplex (gams only), highs, xpress
# Sizes:      small, medium, large, xlarge
#
# xpress jobs load the xpressmp module via FRAMEWORK_MODULES env override.
# xlarge jobs get extra memory (128G), time (4h), and CPUs (8).
#
# After writing this file, generate the Slurm layer on Kestrel:
#   torc slurm generate --account reedseda -o torc_kestrel_full_matrix_slurm.yaml \
#       tests/framework_comparison/torc_kestrel_full_matrix.yaml
# ============================================================================

name: framework-comparison-kestrel-full
description: Full matrix (5 frameworks × {cplex,highs,xpress} × 4 sizes) on Kestrel

slurm_defaults:
  account: "${SLURM_ACCOUNT:-reedseda}"
  partition: "${SLURM_PARTITION:-standard}"

env:
  FRAMEWORK_MODULES: "${FRAMEWORK_MODULES:-gams/51.3.0 conda/2024.06.1}"
  FRAMEWORK_COMPARISON_ARCO_PREFIX: "${FRAMEWORK_COMPARISON_ARCO_PREFIX:-/scratch/psanchez/arco/latest}"
  TORC_API_URL: "${TORC_API_URL:-http://torc.hpc.nrel.gov:8080/torc-service/v1}"

# Resource requirement profiles
resource_requirements:
  - name: small_job
    num_cpus: 4
    memory: "16G"
    runtime: "PT30M"

  - name: medium_job
    num_cpus: 4
    memory: "32G"
    runtime: "PT1H"

  - name: large_job
    num_cpus: 4
    memory: "64G"
    runtime: "PT2H"

  - name: xlarge_job
    num_cpus: 8
    memory: "128G"
    runtime: "PT4H"

# ============================================================================
jobs:
  # --- gams / cplex ---------------------------------------------------
  - name: gams_cplex_small
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh --
    command: >
      python tests/framework_comparison/run_framework.py
        --module solve_gams --solver cplex --size small
        --label gams_cplex_small
    resource_requirements: small_job

  - name: gams_cplex_medium
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh --
    command: >
      python tests/framework_comparison/run_framework.py
        --module solve_gams --solver cplex --size medium
        --label gams_cplex_medium
    resource_requirements: medium_job

  - name: gams_cplex_large
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh --
    command: >
      python tests/framework_comparison/run_framework.py
        --module solve_gams --solver cplex --size large
        --label gams_cplex_large
    resource_requirements: large_job

  - name: gams_cplex_xlarge
    invocation_script: bash tests/framework_comparison/setup_env_hpc.sh --
    command: >
      python tests/framework_comparison/run_framework.py
        --module solve_gams --solver cplex --size xlarge
